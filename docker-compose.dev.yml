services:
  backend:
    image: golang:1.26-alpine
    working_dir: /app
    command: >-
      sh -c "go install github.com/air-verse/air@latest &&
      go mod download &&
      /go/bin/air -c .air.toml"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/calculator:/app
      - /app/node_modules
    depends_on:
      - backend
