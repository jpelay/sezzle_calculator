services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      GIN_MODE: release
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/calculator/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"